{% extends "base.html" %}

{% block title %}Login | GameVault{% endblock %}

{% block content %}
<!-- Přihlašovací formulář pro uživatele. -->
<section class="auth-wrap">
    <form class="auth-card" method="post">
        <p class="eyebrow">Welcome back</p>
        <h1>Login</h1>

        <label for="identity">Username or email</label>
        <input id="identity" name="identity" type="text" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <label class="check-row">
            <input name="remember" type="checkbox">
            <span>Remember me</span>
        </label>

        <button class="button button-primary full-button" type="submit">Login</button>
        <p class="form-note">New here? <a href="{{ url_for('register') }}">Create an account</a>.</p>
    </form>
</section>
{% endblock %}
